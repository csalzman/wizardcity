name: Deploy to DigitalOcean

# Run on every push to main, plus allow manual triggering from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }} # droplet IP or hostname
          username: ${{ secrets.DROPLET_USER }} # e.g. root or deploy
          key: ${{ secrets.DROPLET_SSH_KEY }} # private SSH key (PEM contents)
          port: ${{ secrets.DROPLET_PORT }} # usually 22 (optional)
          script: |
            set -e
            cd /var/www/wizardcity                  # path to the repo on the droplet
            git fetch --all
            git reset --hard origin/main            # discard local changes, match remote
            git pull origin main

            sudo npm install
            pm2 start index.js
