name: Deploy to DigitalOcean

# Run on every push to main, plus allow manual triggering from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }} # droplet IP or hostname
          username: ${{ secrets.DROPLET_USER }} # e.g. root or deploy
          key: ${{ secrets.DROPLET_SSH_KEY }} # private SSH key (PEM contents)
          port: ${{ secrets.DROPLET_PORT }} # usually 22 (optional)
          script: |
            set -e
            su nodejs
            cd /var/www/wizardcity                  
            git fetch --all

            # discard local changes, match remote
            git reset --hard origin/main            

            # get latest changes
            git pull origin main

            export NODE_OPTIONS="--max-old-space-size=5096"

            # Yarn things
            yarn install

            # Build to ./dist
            tsc

            # Restart PM2. PM2 runs on the nodejs user
            pm2 restart wizardcity
