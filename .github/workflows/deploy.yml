name: Deploy to Droplet

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    uses: appleboy/ssh-action@v0.1.5
    with:
      host: ${{ secrets.DROPLET_IP }}
      username: root
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      script: |
        cd /var/www/repo
        git pull origin main
        systemctl restart spellbook.service
