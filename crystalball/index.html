<html>
  <body>
    <h1>WIZARD CITY</h1>
    <div id="map"></div>
    <p><a href="/login">login</a></p>
    <p><a href="https://github.com/csalzman/wizardcity">github</a></p>
  </body>

  <script>
    async function getData() {
      const url = "/spellbook/map";
      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`Response status: ${response.status}`);
        }

        const result = await response.json();
        console.log(result);
      } catch (error) {
        console.error(error.message);
      }
    }
    getData();
  </script>
</html>
